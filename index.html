<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Rizzuti Dental Office — Calendario</title>
<style>
@import url('https://fonts.googleapis.com/css2?family=Cormorant+Garamond:wght@400;600;700&family=Montserrat:wght@400;500;600;700;800&display=swap');
:root{
  --marron:#4A3728;--marron-dark:#2E1F14;--marron-light:#7A6558;
  --crema:#FAF8F6;--gris:#F2EFEC;--borde:#E0DAD4;--texto:#8A7E76;--negro:#2A1F1A;--blanco:#FFFFFF;
}
*{box-sizing:border-box;margin:0;padding:0;}
body{background:var(--crema);font-family:'Montserrat',sans-serif;color:var(--negro);height:100vh;display:flex;flex-direction:column;}
header{background:var(--marron-dark);height:56px;display:flex;align-items:center;justify-content:space-between;padding:0 28px;flex-shrink:0;}
.logo-wrap{display:flex;flex-direction:column;gap:1px;}
.logo{font-family:'Cormorant Garamond',serif;font-size:20px;font-weight:700;letter-spacing:.2em;text-transform:uppercase;color:var(--crema);}
.logo-sub{font-size:7px;font-weight:600;letter-spacing:.25em;text-transform:uppercase;color:rgba(250,248,246,.4);}
.header-right{display:flex;align-items:center;gap:12px;}
.header-tag{font-size:9px;font-weight:600;letter-spacing:.12em;text-transform:uppercase;color:rgba(250,248,246,.35);}
.sync-status{font-size:9px;font-weight:600;letter-spacing:.08em;text-transform:uppercase;padding:3px 8px;border-radius:2px;}
.sync-ok{color:#4CAF50;}
.sync-saving{color:rgba(250,248,246,.5);}
.sync-error{color:#ff6b6b;}
.mes-nav{background:var(--blanco);border-bottom:1px solid var(--borde);display:flex;padding:0 28px;flex-shrink:0;}
.mes-nav-months{display:flex;overflow-x:auto;scrollbar-width:none;flex:1;}
.mes-nav-months::-webkit-scrollbar{display:none;}
.mes-btn{padding:0 14px;height:40px;font-family:'Montserrat',sans-serif;font-size:10px;font-weight:700;letter-spacing:.1em;text-transform:uppercase;color:var(--texto);background:none;border:none;border-bottom:2px solid transparent;cursor:pointer;white-space:nowrap;margin-bottom:-1px;}
.mes-btn.active{color:var(--marron);border-bottom-color:var(--marron);}
.app-body{display:flex;flex:1;overflow:hidden;}
.cal-wrap{flex:1;overflow-y:auto;padding:24px 28px;}
.cal-titulo{display:flex;align-items:baseline;gap:10px;margin-bottom:18px;}
.cal-nombre{font-family:'Cormorant Garamond',serif;font-size:26px;font-weight:700;letter-spacing:.08em;text-transform:uppercase;}
.cal-año{font-size:11px;font-weight:500;color:var(--texto);}
.cal-grid{display:grid;grid-template-columns:repeat(7,1fr);gap:4px;}
.cal-dow{font-size:9px;font-weight:700;letter-spacing:.1em;text-transform:uppercase;color:var(--texto);text-align:center;padding:6px 0 8px;}
.cal-day{background:var(--blanco);border:1px solid var(--borde);border-radius:4px;min-height:80px;padding:8px 7px 7px;cursor:default;transition:border-color .15s;}
.cal-day.has-content{cursor:pointer;}
.cal-day.has-content:hover{border-color:var(--marron);}
.cal-day.selected{border-color:var(--marron);border-width:2px;}
.cal-day.empty-day{background:transparent;border-color:transparent;}
.day-num{font-size:13px;font-weight:700;color:var(--negro);margin-bottom:5px;line-height:1;}
.cal-day.empty-day .day-num{color:var(--borde);}
.day-badges{display:flex;flex-direction:column;gap:3px;}
.badge{font-size:8px;font-weight:700;letter-spacing:.06em;text-transform:uppercase;padding:2px 6px;border-radius:2px;display:inline-flex;align-items:center;gap:3px;}
.badge-historia{background:var(--marron);color:var(--blanco);}
.badge-feed{background:var(--marron-light);color:var(--blanco);}
.badge-count{opacity:.7;}
.panel{width:340px;flex-shrink:0;background:var(--blanco);border-left:1px solid var(--borde);display:flex;flex-direction:column;overflow:hidden;transition:width .2s;}
.panel.closed{width:0;}
.panel-head{background:var(--marron-dark);padding:14px 18px;display:flex;align-items:center;justify-content:space-between;flex-shrink:0;}
.panel-fecha{color:var(--crema);font-family:'Cormorant Garamond',serif;font-size:16px;font-weight:600;letter-spacing:.06em;}
.panel-close{background:none;border:none;color:rgba(250,248,246,.5);font-size:18px;cursor:pointer;line-height:1;padding:0 4px;}
.panel-close:hover{color:var(--crema);}
.panel-checks{display:flex;gap:8px;padding:14px 18px;border-bottom:1px solid var(--borde);flex-shrink:0;}
.check-btn{display:flex;align-items:center;gap:5px;padding:6px 12px;border-radius:3px;border:1.5px solid var(--borde);background:var(--blanco);cursor:pointer;font-family:'Montserrat',sans-serif;font-size:10px;font-weight:700;letter-spacing:.08em;text-transform:uppercase;color:var(--texto);transition:all .15s;user-select:none;}
.check-btn:hover{border-color:var(--marron);color:var(--marron);}
.check-btn.checked-historia{background:var(--marron);border-color:var(--marron);color:var(--blanco);}
.check-btn.checked-feed{background:var(--marron-light);border-color:var(--marron-light);color:var(--blanco);}
.check-icon{width:13px;height:13px;border-radius:2px;border:1.5px solid currentColor;display:flex;align-items:center;justify-content:center;font-size:9px;font-weight:900;flex-shrink:0;}
.check-btn.checked-historia .check-icon,.check-btn.checked-feed .check-icon{background:rgba(255,255,255,.2);border-color:rgba(255,255,255,.4);}
.panel-body{flex:1;overflow-y:auto;padding:14px 18px;display:flex;flex-direction:column;gap:12px;}
.slot-block{background:var(--crema);border:1px solid var(--borde);border-radius:4px;overflow:hidden;}
.slot-header{padding:8px 12px;border-bottom:1px solid var(--borde);display:flex;align-items:center;justify-content:space-between;}
.slot-chip{font-size:9px;font-weight:700;letter-spacing:.1em;text-transform:uppercase;padding:3px 8px;border-radius:2px;}
.slot-chip-feed{background:var(--marron-light);color:var(--blanco);}
.slot-chip-historia{background:var(--marron);color:var(--blanco);}
.slot-remove-btn{font-size:9px;font-weight:700;color:var(--texto);background:none;border:none;cursor:pointer;letter-spacing:.06em;text-transform:uppercase;}
.slot-remove-btn:hover{color:var(--marron);}
.slot-inner{padding:10px 12px;display:flex;flex-direction:column;gap:8px;}
.slot-desc{font-size:12px;font-weight:600;color:var(--negro);border:none;background:none;outline:none;width:100%;resize:none;overflow:hidden;font-family:'Montserrat',sans-serif;line-height:1.5;}
.slot-copy{font-size:11px;color:var(--texto);border:1px dashed var(--borde);border-radius:3px;background:var(--blanco);padding:7px 9px;outline:none;width:100%;resize:none;overflow:hidden;font-family:'Montserrat',sans-serif;line-height:1.6;min-height:36px;}
.slot-copy::placeholder{color:#C8C4C0;}
.slot-copy:focus{border-color:var(--marron);color:var(--negro);}
.slot-img-area{position:relative;width:100%;aspect-ratio:16/9;background:var(--gris);border-radius:3px;border:1.5px dashed var(--borde);display:flex;flex-direction:column;align-items:center;justify-content:center;cursor:pointer;overflow:hidden;transition:border-color .15s;}
.slot-img-area:hover{border-color:var(--marron);}
.slot-img-area img{width:100%;height:100%;object-fit:cover;}
.slot-img-area input[type="file"]{position:absolute;inset:0;opacity:0;cursor:pointer;}
.img-ph{display:flex;flex-direction:column;align-items:center;gap:4px;pointer-events:none;}
.img-ph .plus{font-size:20px;color:var(--borde);}
.img-ph span{font-size:8px;font-weight:700;letter-spacing:.1em;text-transform:uppercase;color:var(--texto);}
.slot-img-area:hover .plus{color:var(--marron);}
.slot-img-area:hover .img-ph span{color:var(--marron);}
.img-rm{position:absolute;top:5px;right:5px;background:var(--marron);color:white;border:none;border-radius:50%;width:20px;height:20px;font-size:10px;cursor:pointer;font-weight:700;display:none;align-items:center;justify-content:center;z-index:2;}
.img-rm.show{display:flex;}
.uploading{position:absolute;inset:0;background:rgba(250,248,246,.9);display:none;align-items:center;justify-content:center;font-size:10px;font-weight:700;letter-spacing:.08em;text-transform:uppercase;color:var(--marron);}
.uploading.show{display:flex;}
.add-btn{display:flex;align-items:center;gap:7px;padding:8px 12px;background:none;border:1.5px dashed var(--borde);border-radius:4px;cursor:pointer;font-family:'Montserrat',sans-serif;font-size:10px;font-weight:700;letter-spacing:.08em;text-transform:uppercase;color:var(--texto);width:100%;transition:all .15s;}
.add-btn:hover{border-color:var(--marron);color:var(--marron);}
.add-icon{width:18px;height:18px;border-radius:50%;background:var(--gris);display:flex;align-items:center;justify-content:center;font-size:12px;font-weight:700;flex-shrink:0;}
.panel-empty{padding:40px 18px;text-align:center;color:var(--texto);font-size:11px;font-weight:500;letter-spacing:.04em;}
.loading-screen{position:fixed;inset:0;background:var(--crema);display:flex;align-items:center;justify-content:center;z-index:999;flex-direction:column;gap:12px;}
.loading-screen .loading-logo{font-family:'Cormorant Garamond',serif;font-size:28px;font-weight:700;letter-spacing:.2em;text-transform:uppercase;color:var(--marron-dark);}
.loading-screen .loading-sub{font-size:9px;font-weight:600;letter-spacing:.2em;text-transform:uppercase;color:var(--texto);}
@media(max-width:700px){
  .panel{position:fixed;right:0;top:0;bottom:0;z-index:100;width:100%!important;max-width:380px;}
  .panel.closed{width:0!important;}
}
</style>
</head>
<body>

<div class="loading-screen" id="loadingScreen">
  <div class="loading-logo">Rizzuti</div>
  <div class="loading-sub">Cargando calendario...</div>
</div>

<header>
  <div class="logo-wrap">
    <div class="logo">Rizzuti</div>
    <div class="logo-sub">Dental Office</div>
  </div>
  <div class="header-right">
    <div class="sync-status sync-ok" id="syncStatus">● Sincronizado</div>
    <div class="header-tag">Calendario 2026</div>
  </div>
</header>
<div class="mes-nav"><div class="mes-nav-months" id="mesNav"></div></div>
<div class="app-body">
  <div class="cal-wrap" id="calWrap"></div>
  <div class="panel closed" id="panel">
    <div class="panel-head">
      <div class="panel-fecha" id="panelFecha">—</div>
      <button class="panel-close" onclick="closePanel()">×</button>
    </div>
    <div class="panel-checks" id="panelChecks"></div>
    <div class="panel-body" id="panelBody"></div>
  </div>
</div>

<!-- Firebase -->
<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/11.10.0/firebase-app.js";
import { getFirestore, doc, getDoc, setDoc } from "https://www.gstatic.com/firebasejs/11.10.0/firebase-firestore.js";

// ── CONFIG ───────────────────────────────────────────────────────────────────
const firebaseConfig = {
  apiKey: "AIzaSyBoW7G4NYcjbW75rR8rIxRlM7Y8e7flc3w",
  authDomain: "rizzuti-calendario.firebaseapp.com",
  projectId: "rizzuti-calendario",
  storageBucket: "rizzuti-calendario.firebasestorage.app",
  messagingSenderId: "788415799353",
  appId: "1:788415799353:web:ac0fb0933478d42678ade8",
  measurementId: "G-LWKBZKG92L"
};

const CLOUD_NAME = 'n6arlxei';
const UPLOAD_PRESET = 'calendario_preset';

const app = initializeApp(firebaseConfig);
const db = getFirestore(app);

// ── CONSTANTES ────────────────────────────────────────────────────────────────
const MESES=['Enero','Febrero','Marzo','Abril','Mayo','Junio','Julio','Agosto','Septiembre','Octubre','Noviembre','Diciembre'];
const DIAS_S=['Dom','Lun','Mar','Mié','Jue','Vie','Sáb'];
const DOW_LABELS=['D','L','M','X','J','V','S'];
const AÑO=2026;
const MESES_ACTIVOS=[4,5,6,7,8,9,10,11];
let mesActual=5;
let selectedKey=null;
let saveTimeout=null;

const days = {};

// ── FIRESTORE ────────────────────────────────────────────────────────────────
function setSyncStatus(status){
  const el=document.getElementById('syncStatus');
  if(status==='ok'){el.textContent='● Sincronizado';el.className='sync-status sync-ok';}
  else if(status==='saving'){el.textContent='● Guardando...';el.className='sync-status sync-saving';}
  else{el.textContent='● Error al guardar';el.className='sync-status sync-error';}
}

async function loadFromFirestore(){
  try{
    const ref=doc(db,'calendarios','rizzuti-2026');
    const snap=await getDoc(ref);
    if(snap.exists()){
      const data=snap.data();
      Object.assign(days, data.days||{});
    }
  }catch(e){console.error('Load error',e);}
}

function scheduleSave(){
  setSyncStatus('saving');
  if(saveTimeout) clearTimeout(saveTimeout);
  saveTimeout=setTimeout(async()=>{
    try{
      await setDoc(doc(db,'calendarios','rizzuti-2026'),{days});
      setSyncStatus('ok');
    }catch(e){setSyncStatus('error');}
  },1500);
}

// ── INIT DAY ─────────────────────────────────────────────────────────────────
function initDay(key,year,month,d){
  if(days[key]) return;
  const date=new Date(year,month,d);const dow=date.getDay();
  let historias=[],feed=false,feedDesc='';
  const hDescs={2:'Menú ejecutivo',3:'Venta mayorista (foto y/o video)',4:'Menú ejecutivo',5:'Especial del finde'};
  if([2,3,4,5].includes(dow)) historias=[{id:key+'-h0',desc:hDescs[dow]||'',copy:'',img:''}];
  if(dow===4){feed=true;feedDesc='Producto terminado y proceso (carrusel)';}
  days[key]={historias,feed,feedDesc,feedCopy:'',feedImg:''};
}

function hasContent(key){const d=days[key];return d&&(d.historias.length>0||d.feed);}

function buildMonth(year,month){
  const last=new Date(year,month+1,0).getDate();
  for(let d=1;d<=last;d++){
    const date=new Date(year,month,d);const dow=date.getDay();const key=ds(year,month,d);
    if([2,3,4,5].includes(dow)) initDay(key,year,month,d);
  }
}

function ds(y,m,d){return `${y}-${String(m+1).padStart(2,'0')}-${String(d).padStart(2,'0')}`;}

// ── CLOUDINARY ────────────────────────────────────────────────────────────────
async function uploadToCloudinary(file){
  const fd=new FormData();fd.append('file',file);fd.append('upload_preset',UPLOAD_PRESET);
  const res=await fetch(`https://api.cloudinary.com/v1_1/${CLOUD_NAME}/image/upload`,{method:'POST',body:fd});
  const data=await res.json();
  if(data.secure_url) return data.secure_url;
  throw new Error('Upload failed');
}

// ── RENDER ────────────────────────────────────────────────────────────────────
function renderNav(){
  const nav=document.getElementById('mesNav');nav.innerHTML='';
  MESES_ACTIVOS.forEach(m=>{
    const btn=document.createElement('button');
    btn.className='mes-btn'+(m===mesActual?' active':'');
    btn.textContent=MESES[m];
    btn.onclick=()=>{mesActual=m;selectedKey=null;closePanel();renderNav();renderCal();};
    nav.appendChild(btn);
  });
}

function renderCal(){
  buildMonth(AÑO,mesActual);
  const wrap=document.getElementById('calWrap');
  const firstDay=new Date(AÑO,mesActual,1).getDay();
  const lastDate=new Date(AÑO,mesActual+1,0).getDate();
  let html=`<div class="cal-titulo"><div class="cal-nombre">${MESES[mesActual]}</div><div class="cal-año">${AÑO}</div></div><div class="cal-grid">`;
  DOW_LABELS.forEach(d=>html+=`<div class="cal-dow">${d}</div>`);
  for(let i=0;i<firstDay;i++) html+=`<div class="cal-day empty-day"></div>`;
  for(let d=1;d<=lastDate;d++){
    const key=ds(AÑO,mesActual,d);const hc=hasContent(key);const day=days[key];const isSelected=selectedKey===key;
    let cls='cal-day'+(hc?' has-content':'')+(isSelected?' selected':'');
    let badges='';
    if(day){
      const hCount=day.historias.length;
      if(hCount>0) badges+=`<div class="badge badge-historia">Hist${hCount>1?` <span class="badge-count">×${hCount}</span>`:''}</div>`;
      if(day.feed) badges+=`<div class="badge badge-feed">Post</div>`;
    }
    html+=`<div class="${cls}" id="calday-${key}" onclick="${hc?`selectDay('${key}')`:`selectDayEmpty('${key}',${d})`}">
      <div class="day-num">${d}</div><div class="day-badges">${badges}</div></div>`;
  }
  wrap.innerHTML=html+'</div>';
}

window.selectDay=function(key){
  if(selectedKey===key){closePanel();return;}
  if(selectedKey){const p=document.getElementById('calday-'+selectedKey);if(p)p.classList.remove('selected');}
  selectedKey=key;const el=document.getElementById('calday-'+key);if(el)el.classList.add('selected');
  openPanel(key);
};

window.selectDayEmpty=function(key,d){
  if(!days[key]) days[key]={historias:[],feed:false,feedDesc:'',feedCopy:'',feedImg:''};
  selectDay(key);
};

function openPanel(key){
  document.getElementById('panel').classList.remove('closed');
  const d=parseInt(key.split('-')[2]);const date=new Date(AÑO,mesActual,d);
  document.getElementById('panelFecha').textContent=`${DIAS_S[date.getDay()]} ${d} de ${MESES[mesActual]}`;
  renderPanelChecks(key);renderPanelBody(key);
}

window.closePanel=function(){
  document.getElementById('panel').classList.add('closed');
  if(selectedKey){const el=document.getElementById('calday-'+selectedKey);if(el)el.classList.remove('selected');}
  selectedKey=null;
};

function renderPanelChecks(key){
  const day=days[key];const hChecked=day&&day.historias.length>0;const fChecked=day&&day.feed;
  document.getElementById('panelChecks').innerHTML=`
    <div class="check-btn ${hChecked?'checked-historia':''}" id="chk-h-${key}" onclick="toggleHistoria('${key}')">
      <div class="check-icon">${hChecked?'✓':''}</div>Historia</div>
    <div class="check-btn ${fChecked?'checked-feed':''}" id="chk-f-${key}" onclick="toggleFeed('${key}')">
      <div class="check-icon">${fChecked?'✓':''}</div>Post</div>`;
}

function renderPanelBody(key){
  const day=days[key];
  if(!day||(day.historias.length===0&&!day.feed)){
    document.getElementById('panelBody').innerHTML=`<div class="panel-empty">Activá Historia o Post para agregar contenido</div>`;return;
  }
  let html='';
  day.historias.forEach((h,i)=>{
    const canRemove=day.historias.length>1;
    html+=`<div class="slot-block">
      <div class="slot-header">
        <span class="slot-chip slot-chip-historia">Historia${day.historias.length>1?' '+(i+1):''}</span>
        ${canRemove?`<button class="slot-remove-btn" onclick="removeHistoria('${key}',${i})">Eliminar</button>`:''}
      </div>
      <div class="slot-inner">
        <textarea class="slot-desc" rows="1" oninput="days['${key}'].historias[${i}].desc=this.value;scheduleSave();autoResize(this)">${h.desc}</textarea>
        <div class="slot-img-area" id="imgarea-h-${h.id}">
          <div class="img-ph"><div class="plus">+</div><span>Subir imagen</span></div>
          <input type="file" accept="image/*,video/*" onchange="handleImg(event,'${key}','h',${i})">
          <div class="uploading" id="upl-h-${h.id}">Subiendo...</div>
          <button class="img-rm" id="rm-h-${h.id}" onclick="removeImg(event,'h-${h.id}','${key}','h',${i})">×</button>
        </div>
        <textarea class="slot-copy" rows="2" placeholder="Copy de la historia..." oninput="days['${key}'].historias[${i}].copy=this.value;scheduleSave();autoResize(this)">${h.copy}</textarea>
      </div></div>`;
  });
  if(day.historias.length<5) html+=`<button class="add-btn" onclick="addHistoria('${key}')"><span class="add-icon">+</span>Agregar otra historia</button>`;
  if(day.feed){
    html+=`<div class="slot-block">
      <div class="slot-header"><span class="slot-chip slot-chip-feed">Post</span></div>
      <div class="slot-inner">
        <textarea class="slot-desc" rows="1" oninput="days['${key}'].feedDesc=this.value;scheduleSave();autoResize(this)">${day.feedDesc}</textarea>
        <div class="slot-img-area" id="imgarea-f-${key}">
          <div class="img-ph"><div class="plus">+</div><span>Subir imagen o video</span></div>
          <input type="file" accept="image/*,video/*" onchange="handleImg(event,'${key}','f',0)">
          <div class="uploading" id="upl-f-${key}">Subiendo...</div>
          <button class="img-rm" id="rm-f-${key}" onclick="removeImg(event,'f-${key}','${key}','f',0)">×</button>
        </div>
        <textarea class="slot-copy" rows="2" placeholder="Copy del post..." oninput="days['${key}'].feedCopy=this.value;scheduleSave();autoResize(this)">${day.feedCopy}</textarea>
      </div></div>`;
  }
  document.getElementById('panelBody').innerHTML=html;
  setTimeout(()=>{document.querySelectorAll('#panelBody textarea').forEach(autoResize);restoreImgs(key);},10);
}

function restoreImgs(key){
  const day=days[key];if(!day) return;
  day.historias.forEach(h=>{if(h.img)setImgSrc('h-'+h.id,h.img);});
  if(day.feedImg)setImgSrc('f-'+key,day.feedImg);
}

function refreshCalDay(key){
  const day=days[key];const el=document.getElementById('calday-'+key);if(!el) return;
  const hc=day&&(day.historias.length>0||day.feed);
  el.className='cal-day'+(hc?' has-content':'')+(selectedKey===key?' selected':'');
  let badges='';
  if(day){
    const hCount=day.historias.length;
    if(hCount>0) badges+=`<div class="badge badge-historia">Hist${hCount>1?` <span class="badge-count">×${hCount}</span>`:''}</div>`;
    if(day.feed) badges+=`<div class="badge badge-feed">Post</div>`;
  }
  el.querySelector('.day-badges').innerHTML=badges;
}

window.toggleHistoria=function(key){
  const day=days[key];
  if(day.historias.length>0){day.historias=[];}
  else{
    const date=new Date(AÑO,mesActual,parseInt(key.split('-')[2]));const dow=date.getDay();
    const descs={2:'Menú ejecutivo',3:'Venta mayorista',4:'Menú ejecutivo',5:'Especial del finde'};
    day.historias=[{id:key+'-h'+Date.now(),desc:descs[dow]||'',copy:'',img:''}];
  }
  scheduleSave();updateChk('chk-h-'+key,'historia',day.historias.length>0);renderPanelBody(key);refreshCalDay(key);
};

window.toggleFeed=function(key){
  const day=days[key];day.feed=!day.feed;
  if(day.feed&&!day.feedDesc) day.feedDesc='Producto terminado y proceso (carrusel)';
  scheduleSave();updateChk('chk-f-'+key,'feed',day.feed);renderPanelBody(key);refreshCalDay(key);
};

function updateChk(id,tipo,checked){
  const btn=document.getElementById(id);if(!btn) return;
  btn.className='check-btn'+(checked?' checked-'+tipo:'');
  btn.querySelector('.check-icon').textContent=checked?'✓':'';
}

window.addHistoria=function(key){
  const day=days[key];if(day.historias.length>=5) return;
  day.historias.push({id:key+'-h'+Date.now(),desc:'',copy:'',img:''});
  scheduleSave();renderPanelBody(key);refreshCalDay(key);
};

window.removeHistoria=function(key,idx){
  days[key].historias.splice(idx,1);
  if(days[key].historias.length===0) updateChk('chk-h-'+key,'historia',false);
  scheduleSave();renderPanelBody(key);refreshCalDay(key);
};

window.autoResize=function(el){el.style.height='auto';el.style.height=el.scrollHeight+'px';};
window.scheduleSave=scheduleSave;

window.handleImg=async function(e,dayKey,tipo,idx){
  const file=e.target.files[0];if(!file) return;
  const hId=tipo==='h'?days[dayKey].historias[idx].id:dayKey;
  const areaId=tipo==='h'?'h-'+hId:'f-'+dayKey;
  const uplEl=document.getElementById('upl-'+areaId);if(uplEl)uplEl.classList.add('show');
  try{
    const fd=new FormData();fd.append('file',file);fd.append('upload_preset',UPLOAD_PRESET);
    const resourceType=file.type.startsWith('video')?'video':'image';
    const res=await fetch(`https://api.cloudinary.com/v1_1/${CLOUD_NAME}/${resourceType}/upload`,{method:'POST',body:fd});
    const data=await res.json();
    if(!data.secure_url) throw new Error('fail');
    const url=data.secure_url;
    if(tipo==='h') days[dayKey].historias[idx].img=url;
    else days[dayKey].feedImg=url;
    scheduleSave();setImgSrc(areaId,url,resourceType==='video');
  }catch(err){alert('Error al subir. Intentá de nuevo.');}
  finally{if(uplEl)uplEl.classList.remove('show');}
};

function setImgSrc(areaId,src,isVideo=false){
  const area=document.getElementById('imgarea-'+areaId);if(!area) return;
  area.querySelector('.img-ph').style.display='none';
  let media=area.querySelector('img,video');
  if(!media){
    media=document.createElement(isVideo?'video':'img');
    if(isVideo){media.controls=true;media.style.width='100%';media.style.height='100%';media.style.objectFit='cover';}
    area.insertBefore(media,area.querySelector('input'));
  }
  media.src=src;
  const rm=document.getElementById('rm-'+areaId);if(rm)rm.classList.add('show');
}

window.removeImg=function(e,areaId,dayKey,tipo,idx){
  e.stopPropagation();
  if(tipo==='h') days[dayKey].historias[idx].img='';
  else days[dayKey].feedImg='';
  scheduleSave();
  const area=document.getElementById('imgarea-'+areaId);if(!area) return;
  const media=area.querySelector('img,video');if(media)media.remove();
  area.querySelector('.img-ph').style.display='flex';
  const rm=document.getElementById('rm-'+areaId);if(rm)rm.classList.remove('show');
};

// ── INIT ──────────────────────────────────────────────────────────────────────
(async()=>{
  await loadFromFirestore();
  document.getElementById('loadingScreen').style.display='none';
  renderNav();
  renderCal();
})();

</script>
